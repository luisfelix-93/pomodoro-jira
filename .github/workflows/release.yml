name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag_and_release:
    name: Tag and Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Check for Release Notes
        id: check_notes
        run: |
          if [ -f "docs/release_notes.md" ]; then
            echo "notes_exist=true" >> $GITHUB_OUTPUT
            echo "Reading release notes..."
            cat docs/release_notes.md
          else
            echo "notes_exist=false" >> $GITHUB_OUTPUT
            echo "No release notes found."
          fi
        shell: bash

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body_path: ${{ steps.check_notes.outputs.notes_exist == 'true' && 'docs/release_notes.md' || '' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build and Upload Assets
    needs: tag_and_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Server Dependencies
        run: |
          cd server
          npm ci
      
      - name: Build Server
        run: npm run build:server

      - name: Build and Upload Artifacts
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npm run build:win
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npm run build:mac
          else
            npm run build:linux
          fi
        shell: bash

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.snap
          tag_name: ${{ needs.tag_and_release.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
